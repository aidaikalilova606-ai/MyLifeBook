<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeke Kitep | Бирдиктүү Отчет</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #800000; --gold: #d4af37; }
        body { font-family: 'Lora', serif; background-color: #4a0000; color: white; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; color: #333; padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); text-align: center; border: 2px solid var(--gold); }
        h2 { font-family: 'Playfair Display', serif; color: var(--main-color); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; font-family: 'Lora', serif; }
        .btn { background: linear-gradient(45deg, var(--main-color), #b30000); color: white; padding: 15px; border: none; width: 100%; border-radius: 50px; margin-top: 20px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .hidden { display: none; }
        .progress { color: var(--gold); font-weight: bold; margin-bottom: 10px; }
        .image-preview-item { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; margin: 5px; border: 1px solid var(--gold); }
        #imageContainer { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="password-section">
        <h2>Кирүү</h2>
        <input type="password" id="passInput" placeholder="Пароль">
        <button class="btn" onclick="checkPassword()">Кирүү</button>
    </div>

    <div id="theme-section" class="hidden">
        <h2>Тема тандаңыз</h2>
        <button class="btn" onclick="startQuiz('апа')">Апам жөнүндө</button>
        <button class="btn" onclick="startQuiz('суйуу')">Сүйүү / Жубайым</button>
    </div>

    <div id="quiz-section" class="hidden">
        <div class="progress" id="progressText">Суроо: 1 / 0</div>
        <h2 id="questionText">Суроо...</h2>
        <textarea id="answerInput" placeholder="Жообуңуз..."></textarea>
        
        <div id="imageArea" class="hidden" style="margin-top:15px; background:#f9f9f9; padding:10px; border-radius:10px;">
            <p style="font-size:12px; color:var(--main-color);">📸 Бул суроого сүрөт тиркеңиз:</p>
            <input type="file" id="stepImage" accept="image/*">
        </div>

        <button class="btn" onclick="nextQuestion()">Кийинки ➡️</button>
    </div>

    <div id="final-section" class="hidden">
        <h2>Баары даяр!</h2>
        <p>Бардык жооптор чогултулду. Эми бир билдирүү менен жөнөтөбүз.</p>
        <div id="imageContainer"></div>
        <button class="btn" id="sendBtn" onclick="sendAllToTelegram()">Телеграмга Жөнөтүү 🚀</button>
    </div>
</div>

<script>
    const BOT_TOKEN = "8604545122:AAEx9ZLtB8Cwl1Juj7ue15ktZoB1UtrpBDQ";
    const CHAT_ID = "5420064941";

    function checkPassword() {
        if (document.getElementById('passInput').value === "1234") {
            document.getElementById('password-section').classList.add('hidden');
            document.getElementById('theme-section').classList.remove('hidden');
        } else { alert("Ката пароль!"); }
    }

    const allQuestions = {
        "апа": [
            { q: "Апаңыздын аты ким?", img: false },
            { q: "Апаңыздын сүйүктүү гүлүнүн сүрөтүн жүктөңүз", img: true },
            { q: "Апаңызга каалооңуз", img: false }
        ],
        "суйуу": [
            { q: "Кантип тааныштыңыз?", img: false },
            { q: "Бирге түшкөн сүрөтүңүз", img: true }
        ]
    };

    let selectedQuestions = [];
    let currentStep = 0;
    let finalReport = ""; // Тексттерди чогултуу үчүн
    let collectedImages = []; // Сүрөттөрдү чогултуу үчүн

    function startQuiz(theme) {
        selectedQuestions = allQuestions[theme];
        finalReport = `📕 **ЖАҢЫ ЗАКАЗ: ${theme.toUpperCase()}**\n\n`;
        document.getElementById('theme-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        updateQuestion();
    }

    function updateQuestion() {
        const quest = selectedQuestions[currentStep];
        document.getElementById('progressText').innerText = `Суроо: ${currentStep + 1} / ${selectedQuestions.length}`;
        document.getElementById('questionText').innerText = quest.q;
        document.getElementById('answerInput').value = "";
        document.getElementById('imageArea').className = quest.img ? "" : "hidden";
    }

    function nextQuestion() {
        const ans = document.getElementById('answerInput').value;
        const photo = document.getElementById('stepImage').files[0];

        // Маалыматты чогултуу (Жөнөтпөстөн, өзгөрмөгө сактайбыз)
        finalReport += `❓ **${selectedQuestions[currentStep].q}**\n✅ ${ans || "Текст жазылган жок"}\n\n`;
        
        if (photo) {
            collectedImages.push(photo);
        }

        currentStep++;
        if (currentStep < selectedQuestions.length) {
            updateQuestion();
        } else {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('final-section').classList.remove('hidden');
        }
    }

    async function sendAllToTelegram() {
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.innerText = "Жөнөтүлүүдө...";

        try {
            // 1. Бардык текстти бир билдирүү кылып жөнөтүү
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: finalReport, parse_mode: 'Markdown' })
            });

            // 2. Сүрөттөрдү кезек менен жөнөтүү
            for (let i = 0; i < collectedImages.length; i++) {
                const fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('photo', collectedImages[i]);
                fd.append('caption', `Тиркелген сүрөт №${i+1}`);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            }

            alert("Ийгиликтүү жөнөтүлдү!");
            location.reload();
        } catch (e) {
            alert("Ката кетти!");
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
