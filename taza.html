<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAZA SHOP - Ош Филиалдары</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f0f7f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .header {
            background-color: white;
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        /* Логотиптин стили */
        .logo-img {
            width: 120px; /* Логотиптин өлчөмү */
            height: 120px;
            border-radius: 50%; /* Тегерек кылат */
            object-fit: cover;
            border: 4px solid #00acc1;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 { font-size: 24px; color: #006064; margin: 10px 0; letter-spacing: 1px; }
        .subtitle { color: #546e7a; font-size: 13px; font-weight: bold; margin-bottom: 0; }

        .branch-card {
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 25px;
            margin-bottom: 15px;
            border-radius: 20px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            border: 1px solid #e0f2f1;
        }

        .branch-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-color: #25d366;
        }

        .info { text-align: left; }
        .address { display: block; font-weight: bold; font-size: 15px; color: #37474f; margin-top: 4px; }
        .city { font-size: 11px; color: #00acc1; text-transform: uppercase; font-weight: 700; }

        .wa-icon {
            width: 45px;
            height: 45px;
            background-color: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wa-icon img { width: 26px; filter: brightness(0) invert(1); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="logo.jpg" alt="TAZA SHOP Logo" class="logo-img">
            
            <h1>TAZA SHOP</h1>
            <p class="subtitle">КОСМЕТИКА • МЫЛОМОЙКА • МАРКЕТ</p>
        </div>

        <a href="https://wa.me/996XXXXXXXXX" class="branch-card">
            <div class="info">
                <span class="city">Ош шаары</span>
                <span class="address">📍 ул. Муминовой 17</span>
            </div>
            <div class="wa-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
            </div>
        </a>

        <a href="https://wa.me/996XXXXXXXXX" class="branch-card">
            <div class="info">
                <span class="city">Ош шаары</span>
                <span class="address">📍 Анар, Абдыкадыровой 217</span>
            </div>
            <div class="wa-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
            </div>
        </a>

        <a href="https://wa.me/996XXXXXXXXX" class="branch-card">
            <div class="info">
                <span class="city">Ош шаары</span>
                <span class="address">📍 Курманжан Датка 80</span>
            </div>
            <div class="wa-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
            </div>
        </a>
    </div>

    <p style="color: #90a4ae; font-size: 12px; margin-top: 20px;">Taza Shop Osh © 2026</p>

</body>
</html>
